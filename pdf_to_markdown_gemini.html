<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF → Markdown · Gemini</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0e;
    --surface: #161616;
    --border: #2a2a2a;
    --accent: #4db7ff;
    --accent-dim: #2a7aaa;
    --text: #e8e8e8;
    --text-dim: #777;
    --danger: #ff6b6b;
    --radius: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 28px 40px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 16px;
  }

  header h1 {
    font-family: 'Fraunces', serif;
    font-size: 26px;
    font-weight: 300;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  header h1 span { color: var(--accent); font-style: italic; }
  header small { color: var(--text-dim); font-size: 11px; }

  .container {
    display: grid;
    grid-template-columns: 340px 1fr;
    flex: 1;
    min-height: 0;
  }

  .sidebar {
    border-right: 1px solid var(--border);
    padding: 28px 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    overflow-y: auto;
  }

  .field label {
    display: block;
    color: var(--text-dim);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .field input[type="password"],
  .field select,
  .field textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.15s;
  }

  .field input:focus,
  .field select:focus,
  .field textarea:focus { border-color: var(--accent-dim); }

  .field textarea { resize: vertical; min-height: 90px; line-height: 1.5; }
  .field select option { background: #1a1a1a; }

  .dropzone {
    border: 1.5px dashed var(--border);
    border-radius: var(--radius);
    padding: 24px 16px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
  }

  .dropzone:hover, .dropzone.drag-over {
    border-color: var(--accent);
    background: rgba(77,183,255,0.04);
  }

  .dropzone input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer;
  }

  .dropzone .icon { font-size: 28px; margin-bottom: 8px; display: block; }
  .dropzone p { color: var(--text-dim); font-size: 11px; line-height: 1.6; }
  .dropzone p strong { color: var(--text); }

  .file-list { display: flex; flex-direction: column; gap: 6px; max-height: 200px; overflow-y: auto; }

  .file-item {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 10px;
    font-size: 11px;
  }

  .file-item .fname { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-item .fsize { color: var(--text-dim); flex-shrink: 0; }
  .file-item .remove {
    background: none; border: none; color: var(--text-dim); cursor: pointer;
    padding: 2px; line-height: 1; font-size: 14px; flex-shrink: 0;
  }
  .file-item .remove:hover { color: var(--danger); }
  .file-item .status { flex-shrink: 0; width: 8px; height: 8px; border-radius: 50%; background: var(--border); }
  .file-item.running .status { background: var(--accent); animation: pulse 1s infinite; }
  .file-item.done .status { background: #4ade80; }
  .file-item.error .status { background: var(--danger); }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  .btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 11px 18px; border-radius: var(--radius); border: none;
    font-family: 'IBM Plex Mono', monospace; font-size: 12px; cursor: pointer;
    transition: opacity .15s, transform .1s; letter-spacing: 0.04em; width: 100%;
  }
  .btn:active { transform: scale(.98); }
  .btn:disabled { opacity: .35; cursor: not-allowed; }
  .btn-primary { background: var(--accent); color: #0e0e0e; font-weight: 500; }
  .btn-primary:hover:not(:disabled) { opacity: .88; }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text-dim); }
  .btn-ghost:hover:not(:disabled) { border-color: var(--text-dim); color: var(--text); }

  .main { display: flex; flex-direction: column; overflow: hidden; }

  .tabs {
    display: flex; border-bottom: 1px solid var(--border);
    padding: 0 24px; overflow-x: auto;
  }

  .tab {
    padding: 14px 18px; font-size: 11px; cursor: pointer; color: var(--text-dim);
    border-bottom: 2px solid transparent; white-space: nowrap; transition: color .15s;
    background: none; border-top: none; border-left: none; border-right: none;
    font-family: 'IBM Plex Mono', monospace; letter-spacing: 0.06em;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .panel { flex: 1; overflow: auto; display: none; padding: 24px; }
  .panel.active { display: block; }

  .output-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); margin-bottom: 20px; overflow: hidden;
  }

  .output-card-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px; border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,.02);
  }

  .output-card-header .title { font-size: 11px; color: var(--accent); letter-spacing: .08em; }
  .output-card-header .actions { display: flex; gap: 8px; }

  .copy-btn, .dl-btn {
    background: none; border: 1px solid var(--border); border-radius: 4px;
    color: var(--text-dim); font-family: 'IBM Plex Mono', monospace; font-size: 10px;
    padding: 4px 10px; cursor: pointer; transition: all .15s; letter-spacing: .05em;
  }
  .copy-btn:hover, .dl-btn:hover { border-color: var(--accent-dim); color: var(--accent); }

  .output-content {
    padding: 18px 20px; font-size: 12px; line-height: 1.75;
    white-space: pre-wrap; word-break: break-word;
    max-height: 500px; overflow-y: auto;
  }

  .empty-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 300px; gap: 12px; color: var(--text-dim);
  }
  .empty-state .big { font-size: 40px; }

  .log-line { font-size: 11px; line-height: 1.8; }
  .log-line.info { color: var(--text-dim); }
  .log-line.ok   { color: #4ade80; }
  .log-line.err  { color: var(--danger); }
  .log-line.warn { color: #fbbf24; }
  .log-line .ts  { color: #555; margin-right: 10px; }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .progress-bar { height: 2px; background: var(--border); border-radius: 1px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 1px; transition: width .4s ease; }

  .section-label {
    font-size: 10px; letter-spacing: .12em; text-transform: uppercase;
    color: var(--text-dim); margin-bottom: 10px; display: block;
  }
  .divider { border: none; border-top: 1px solid var(--border); }

  .token-info {
    font-size: 10px; color: var(--text-dim);
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 8px 12px; line-height: 1.7;
  }
  .token-info strong { color: var(--accent); }
</style>
</head>
<body>

<header>
  <h1>PDF <span>→</span> Markdown</h1>
  <small>powered by Gemini 3.1 Flash Lite · uso locale</small>
</header>

<div class="container">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <div class="field">
      <label>API Key Google AI</label>
      <input type="password" id="apiKey" placeholder="AIza..." autocomplete="off">
    </div>

    <div class="field">
      <label>Modello</label>
      <select id="model">
        <option value="gemini-3.1-flash-lite">gemini-3.1-flash-lite (veloce, economico)</option>
        <option value="gemini-3.1-flash">gemini-3.1-flash</option>
        <option value="gemini-2.5-flash-preview-05-20">gemini-2.5-flash-preview</option>
        <option value="gemini-2.5-pro-preview-06-05">gemini-2.5-pro-preview</option>
      </select>
    </div>

    <div class="token-info">
      <strong>gemini-3.1-flash-lite</strong><br>
      Input: 1.048.576 token · Output: 65.536 token<br>
      Supporta PDF nativo ✓
    </div>

    <div class="field">
      <label>Prompt</label>
      <textarea id="systemPrompt">Sei un assistente accademico. Ti viene fornito un capitolo di un manuale universitario in italiano. Convertilo in Markdown ben strutturato, preservando fedelmente tutto il contenuto originale. Usa # per il titolo del capitolo, ## per le sezioni numerate, ### per i sotto-paragrafi con titolo. Metti i termini tecnici in corsivo (*termine*) e i concetti chiave in grassetto (**concetto**). Non omettere nulla, non aggiungere nulla. Non aggiungere introduzioni o conclusioni tue. Output solo Markdown puro.</textarea>
    </div>

    <hr class="divider">

    <div>
      <span class="section-label">File PDF</span>
      <div class="dropzone" id="dropzone">
        <input type="file" id="fileInput" accept=".pdf" multiple>
        <span class="icon">📄</span>
        <p><strong>Trascina i PDF qui</strong><br>o clicca per selezionare<br><small style="color:#555">(anche più capitoli insieme)</small></p>
      </div>
    </div>

    <div id="fileList" class="file-list" style="display:none"></div>

    <div style="display:flex; flex-direction:column; gap:8px; margin-top:auto">
      <div class="progress-bar" id="progressBar" style="display:none">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
      <button class="btn btn-primary" id="runBtn" onclick="processAll()">
        ▶ &nbsp;Converti tutto
      </button>
      <button class="btn btn-ghost" id="dlAllBtn" onclick="downloadAll()" style="display:none">
        ↓ &nbsp;Scarica tutti i .md
      </button>
    </div>

  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('output', this)">OUTPUT</button>
      <button class="tab" onclick="switchTab('log', this)">LOG</button>
    </div>

    <div class="panel active" id="panel-output">
      <div id="emptyState" class="empty-state">
        <span class="big">🗒️</span>
        <span>Il Markdown apparirà qui dopo l'elaborazione</span>
      </div>
      <div id="outputCards"></div>
    </div>

    <div class="panel" id="panel-log">
      <div id="logContent"></div>
    </div>
  </main>

</div>

<script>
let files = [];
let results = {};

// ── File handling ──────────────────────────────────────
const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('fileInput');

dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag-over'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
dropzone.addEventListener('drop', e => {
  e.preventDefault();
  dropzone.classList.remove('drag-over');
  addFiles([...e.dataTransfer.files].filter(f => f.type === 'application/pdf'));
});
fileInput.addEventListener('change', () => { addFiles([...fileInput.files]); fileInput.value = ''; });

function addFiles(newFiles) {
  newFiles.forEach(f => { if (!files.find(x => x.name === f.name)) files.push(f); });
  renderFileList();
}

function removeFile(name) {
  files = files.filter(f => f.name !== name);
  delete results[name];
  renderFileList();
  renderOutputCards();
}

function renderFileList() {
  const list = document.getElementById('fileList');
  if (!files.length) { list.style.display = 'none'; return; }
  list.style.display = 'flex';
  list.innerHTML = files.map(f => `
    <div class="file-item pending" id="fi-${CSS.escape(f.name)}">
      <span class="status"></span>
      <span class="fname" title="${escapeHtml(f.name)}">${escapeHtml(f.name)}</span>
      <span class="fsize">${(f.size/1024).toFixed(0)}k</span>
      <button class="remove" onclick="removeFile('${escapeHtml(f.name)}')" title="Rimuovi">×</button>
    </div>
  `).join('');
}

function setFileStatus(name, status) {
  const el = document.getElementById('fi-' + CSS.escape(name));
  if (el) el.className = 'file-item ' + status;
}

// ── Tabs ───────────────────────────────────────────────
function switchTab(panel, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('panel-' + panel).classList.add('active');
  btn.classList.add('active');
}

// ── Log ────────────────────────────────────────────────
function log(msg, type = 'info') {
  const el = document.getElementById('logContent');
  const ts = new Date().toLocaleTimeString('it-IT');
  el.innerHTML += `<div class="log-line ${type}"><span class="ts">${ts}</span>${escapeHtml(msg)}</div>`;
  el.scrollTop = el.scrollHeight;
}

// ── Base64 ─────────────────────────────────────────────
function fileToBase64(file) {
  return new Promise((res, rej) => {
    const reader = new FileReader();
    reader.onload = () => res(reader.result.split(',')[1]);
    reader.onerror = rej;
    reader.readAsDataURL(file);
  });
}

// ── Gemini API call ────────────────────────────────────
async function callGemini(apiKey, model, systemPrompt, b64pdf, filename) {
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;

  const body = {
    system_instruction: {
      parts: [{ text: systemPrompt }]
    },
    contents: [{
      role: 'user',
      parts: [
        {
          inline_data: {
            mime_type: 'application/pdf',
            data: b64pdf
          }
        },
        {
          text: `Converti questo capitolo PDF in Markdown strutturato come da istruzioni di sistema. File: ${filename}`
        }
      ]
    }],
    generationConfig: {
      maxOutputTokens: 65536,
      temperature: 0.1
    }
  };

  const resp = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });

  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    const msg = err.error?.message || `HTTP ${resp.status}`;
    throw new Error(msg);
  }

  const data = await resp.json();

  // Estrai testo dalla risposta Gemini
  const text = data.candidates?.[0]?.content?.parts
    ?.filter(p => p.text)
    ?.map(p => p.text)
    ?.join('') || '';

  if (!text) throw new Error('Risposta vuota dal modello');

  // Token usage log
  const usage = data.usageMetadata;
  if (usage) {
    log(`  Token usati — input: ${usage.promptTokenCount ?? '?'}, output: ${usage.candidatesTokenCount ?? '?'}`, 'info');
  }

  return text;
}

// ── Main loop ──────────────────────────────────────────
async function processAll() {
  const apiKey    = document.getElementById('apiKey').value.trim();
  const model     = document.getElementById('model').value;
  const sysprompt = document.getElementById('systemPrompt').value.trim();

  if (!apiKey) { alert('Inserisci la tua API Key Google AI.'); return; }
  if (!files.length) { alert('Aggiungi almeno un file PDF.'); return; }

  const runBtn = document.getElementById('runBtn');
  runBtn.disabled = true;
  runBtn.textContent = '⏳  Elaborazione...';

  const pb = document.getElementById('progressBar');
  const pf = document.getElementById('progressFill');
  pb.style.display = 'block';
  pf.style.width = '0%';

  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('outputCards').innerHTML = '';
  results = {};

  log(`Avvio elaborazione · ${files.length} file · modello: ${model}`, 'info');

  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    log(`→ ${file.name} (${(file.size/1024).toFixed(0)} KB)`, 'info');
    setFileStatus(file.name, 'running');

    try {
      const b64 = await fileToBase64(file);
      log(`  PDF convertito in base64. Invio a Gemini...`, 'info');

      const markdown = await callGemini(apiKey, model, sysprompt, b64, file.name);

      results[file.name] = markdown;
      setFileStatus(file.name, 'done');
      log(`  ✓ Completato — ${markdown.length} caratteri generati`, 'ok');
      appendOutputCard(file.name, markdown);

    } catch (err) {
      setFileStatus(file.name, 'error');
      log(`  ✗ Errore: ${err.message}`, 'err');
    }

    pf.style.width = `${((i + 1) / files.length) * 100}%`;
  }

  const ok = Object.keys(results).length;
  log(`Completato: ${ok}/${files.length} file convertiti`, ok === files.length ? 'ok' : 'warn');

  runBtn.disabled = false;
  runBtn.textContent = '▶  Converti tutto';

  if (ok > 1) document.getElementById('dlAllBtn').style.display = 'flex';
}

// ── Output ─────────────────────────────────────────────
function appendOutputCard(filename, markdown) {
  const container = document.getElementById('outputCards');
  const id = 'card-' + filename.replace(/[^a-z0-9]/gi, '_');
  const card = document.createElement('div');
  card.className = 'output-card';
  card.id = id;
  card.innerHTML = `
    <div class="output-card-header">
      <span class="title">📄 ${escapeHtml(filename)}</span>
      <div class="actions">
        <button class="copy-btn" onclick="copyText('${id}')">Copia</button>
        <button class="dl-btn" onclick="downloadMd('${escapeHtml(filename)}')">↓ .md</button>
      </div>
    </div>
    <div class="output-content" id="${id}-content">${escapeHtml(markdown)}</div>
  `;
  container.appendChild(card);
}

function renderOutputCards() {
  document.getElementById('outputCards').innerHTML = '';
  if (!Object.keys(results).length) {
    document.getElementById('emptyState').style.display = 'flex';
    return;
  }
  document.getElementById('emptyState').style.display = 'none';
  Object.entries(results).forEach(([fn, md]) => appendOutputCard(fn, md));
}

function copyText(cardId) {
  const content = document.getElementById(cardId + '-content').textContent;
  navigator.clipboard.writeText(content).then(() => {
    const btn = document.querySelector(`#${cardId} .copy-btn`);
    btn.textContent = '✓ Copiato';
    setTimeout(() => btn.textContent = 'Copia', 1500);
  });
}

function downloadMd(filename) {
  const md = results[filename];
  if (!md) return;
  const blob = new Blob([md], { type: 'text/markdown;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename.replace(/\.pdf$/i, '') + '.md';
  a.click();
}

function downloadAll() {
  Object.keys(results).forEach(fn => downloadMd(fn));
}

function escapeHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
</script>
</body>
</html>
